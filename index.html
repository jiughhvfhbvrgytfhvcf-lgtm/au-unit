<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳洲专线联盟 | AI-Express 智能物流</title>
    <style>
        /* --- 1. 基础样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #ffffff;
            color: #1a1b1e;
            overflow: hidden;
        }

        /* --- 2. 顶部导航栏 --- */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
            align-items: center;
        }
        header a {
            text-decoration: none;
            color: #5f6368;
            margin-left: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        header a:hover { color: #002B7F; }
        
        .nav-login-btn {
            background-color: #002B7F;
            color: #ffffff !important;
            padding: 8px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- 3. 核心搜索区域 --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15vh;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            user-select: none;
        }
        .logo-main {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -1.5px;
        }
        .logo-main .blue { color: #002B7F; }
        .logo-main .gold { color: #FFCD00; }
        
        .logo-sub {
            font-size: 14px;
            color: #8c9096;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 5px;
        }

        /* 搜索框与复合按钮整合 */
        .search-wrapper {
            width: 90%;
            max-width: 600px;
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 100%;
            height: 56px;
            border: 1px solid #dfe1e5;
            border-radius: 28px;
            padding: 0 120px 0 25px; /* 为右侧按钮留足空间 */
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }
        .search-input:focus {
            box-shadow: 0 4px 18px rgba(0,43,127,0.12);
            border-color: rgba(0,43,127,0.2);
        }

        /* 复合式国旗查询按钮 */
        .flag-search-btn {
            position: absolute;
            right: 7px;
            height: 42px;
            border: none;
            border-radius: 21px;
            cursor: pointer;
            background-color: #f0f4ff; /* 浅蓝色背景，暗示可点击 */
            display: flex;
            align-items: center;
            padding: 0 12px;
            transition: all 0.2s;
            box-shadow: 0 2px 4px rgba(0,43,127,0.1);
        }
        .flag-search-btn:hover {
            background-color: #002B7F;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,43,127,0.2);
        }
        .flag-search-btn:hover .search-text {
            color: #ffffff;
        }
        .flag-image {
            width: 24px;
            height: 16px;
            background-image: url('https://flagcdn.com/w80/au.png');
            background-size: cover;
            background-position: center;
            border-radius: 2px;
            margin-right: 8px;
        }
        .search-text {
            font-size: 14px;
            color: #002B7F;
            font-weight: 600;
        }

        /* --- 4. 登录弹窗 --- */
        #login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            text-align: center;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .submit-login {
            width: 100%;
            padding: 12px;
            background: #002B7F;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- 5. 页脚 --- */
        footer {
            background: #f8f9fa;
            padding: 20px 40px;
            font-size: 13px;
            color: #70757a;
            border-top: 1px solid #eee;
        }
        .footer-links { display: flex; justify-content: space-between; }
        .footer-links a { color: #70757a; text-decoration: none; margin-right: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="#">包裹查询</a>
        <a href="#">价格预算</a>
        <a href="javascript:void(0)" class="nav-login-btn" onclick="toggleModal(true)">ERP 登录</a>
    </header>

    <main>
        <div class="logo-container">
            <div class="logo-main">
                <span class="blue">澳洲</span><span class="gold">专线联盟</span>
            </div>
            <div class="logo-sub">AI-EXPRESS ALLIANCE</div>
        </div>

        <div class="search-wrapper">
            <input type="text" class="search-input" placeholder="输入快递单号进行快速追踪..." id="searchBox" onkeydown="if(event.keyCode==13) handleSearch()">
            <button class="flag-search-btn" title="点击进行查询" onclick="handleSearch()">
                <div class="flag-image"></div>
                <div class="search-text">查询</div>
            </button>
        </div>
    </main>

    <div id="login-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; color:#002B7F;">ERP 系统登录</h3>
            <input type="text" id="username" placeholder="账号 / 手机号">
            <input type="password" id="password" placeholder="密码">
            <button class="submit-login" onclick="loginToERP()">提交登录</button>
            <p style="margin-top:15px; font-size:12px; color: #999; cursor:pointer;" onclick="toggleModal(false)">取消返回</p>
        </div>
    </div>

    <footer>
        <div class="footer-top" style="margin-bottom: 10px;">📍 联盟总部：悉尼 | 官方域名：ai-express.cn</div>
        <div class="footer-links">
            <div>
                <a href="#">关于我们</a>
                <a href="#">合作伙伴</a>
            </div>
            <div>
                <span>© 2026 AI-Express Alliance</span>
            </div>
        </div>
    </footer>

    <script>
        function toggleModal(show) {
            document.getElementById('login-modal').style.display = show ? 'flex' : 'none';
        }

        function handleSearch() {
            const val = document.getElementById('searchBox').value;
            if(val) {
                window.location.href = `http://121.196.233.99/track?no=${val}`;
            } else {
                alert('请输入查询单号');
            }
        }

        function loginToERP() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert('请填入账号密码');
            window.location.href = `http://121.196.233.99/login?user=${user}&pass=${pass}`;
        }
    </script>
</body>
</html>
